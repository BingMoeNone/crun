name: release-linux

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
            docker_image: ubuntu:20.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            docker_image: arm64v8/ubuntu:20.04
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary (Docker · glibc 2.31)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            "${{ matrix.docker_image }}" \
            bash -exc "
              export DEBIAN_FRONTEND=noninteractive
              apt-get update && apt-get install -y software-properties-common
              add-apt-repository -y ppa:deadsnakes/ppa
              apt-get install -y python3.12 python3.12-venv

              python3.12 -m venv /opt/venv
              . /opt/venv/bin/activate
              pip install --upgrade pip
              pip install uv

              uv sync --all-groups
              uv run pyinstaller --onefile \
                --name crun \
                --paths src \
                --add-data 'data/flags_default.json:data' \
                src/claude_run/__main__.py
            "

      - name: Rename and checksum
        run: |
          cp dist/crun dist/crun-linux-${{ matrix.arch }}
          cd dist
          sha256sum crun-linux-${{ matrix.arch }} > crun-linux-${{ matrix.arch }}.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: crun-linux-${{ matrix.arch }}
          path: |
            dist/crun-linux-${{ matrix.arch }}
            dist/crun-linux-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd dist
          sha256sum crun-linux-amd64 crun-linux-arm64 > SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/crun-linux-amd64
            dist/crun-linux-amd64.sha256
            dist/crun-linux-arm64
            dist/crun-linux-arm64.sha256
            dist/SHA256SUMS
          generate_release_notes: true
