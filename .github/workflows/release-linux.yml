name: release-linux

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Build binary
        run: |
          uv run pyinstaller --onefile \
            --name claude-run \
            --paths src \
            --add-data "data/flags_default.json:data" \
            src/claude_run/__main__.py

      - name: Rename and checksum
        run: |
          cp dist/claude-run dist/claude-run-linux-${{ matrix.arch }}
          cd dist
          sha256sum claude-run-linux-${{ matrix.arch }} > claude-run-linux-${{ matrix.arch }}.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-run-linux-${{ matrix.arch }}
          path: |
            dist/claude-run-linux-${{ matrix.arch }}
            dist/claude-run-linux-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd dist
          sha256sum claude-run-linux-amd64 claude-run-linux-arm64 > SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/claude-run-linux-amd64
            dist/claude-run-linux-amd64.sha256
            dist/claude-run-linux-arm64
            dist/claude-run-linux-arm64.sha256
            dist/SHA256SUMS
          generate_release_notes: true
